{% extends 'layout.html' %}
{% block content %}
<div class="d-flex justify-content-between mb-3">
  <h3>Admin Dashboard</h3>
  <div>
    <a class="btn btn-sm btn-secondary" href="{{ url_for('reports') }}">Reports</a>
    <a class="btn btn-sm btn-outline-primary" href="{{ url_for('export_csv') }}">Export CSV</a>
  </div>
</div>

<div class="card mb-3">
  <div class="card-body">
    <h5>Register / Update Student</h5>
    <form id="studentForm">
      <div class="row">
        <div class="col-md-3 mb-2"><input name="student_id" placeholder="Student ID" class="form-control" required></div>
        <div class="col-md-3 mb-2"><input name="name" placeholder="Full Name" class="form-control" required></div>
        <div class="col-md-2 mb-2"><input name="department" placeholder="Department" class="form-control"></div>
        <div class="col-md-2 mb-2"><input name="class_name" placeholder="Class" class="form-control"></div>
        <div class="col-md-2 mb-2"><input name="phone" placeholder="Phone" class="form-control"></div>
      </div>
      <div class="row mt-2">
        <div class="col-md-3"><input name="password" placeholder="Password (optional)" class="form-control"></div>
        <div class="col-md-9 text-end"><button class="btn btn-primary">Save Student</button></div>
      </div>
    </form>
  </div>
</div>

<div class="card mb-3">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">📅 Mark Daily Attendance</h5>
      <div class="d-flex align-items-center">
        <label for="attDate" class="me-2 fw-bold text-nowrap mb-0">Date:</label>
        <input type="date" id="attDate" class="form-control form-control-sm" style="width: 150px;">
      </div>
    </div>
    <div class="d-flex mb-3">
      <input id="attSearch" class="form-control form-control-sm me-2" placeholder="Filter students by name or ID...">
      <button id="markAllPresentBtn" class="btn btn-sm btn-success me-2 text-white">Mark All Present</button>
      <button id="markAllLateBtn" class="btn btn-sm btn-warning me-2">Mark All Late</button>
      <button id="markAllAbsentBtn" class="btn btn-sm btn-danger text-white">Mark All Absent</button>
    </div>
    <div class="table-responsive">
      <table class="table table-bordered table-hover align-middle mb-0" id="attendanceGridTable">
        <thead class="table-light">
          <tr>
            <th>Student ID</th>
            <th>Name</th>
            <th>Dept / Class</th>
            <th class="text-center" style="width: 320px;">Mark Status</th>
          </tr>
        </thead>
        <tbody>
          <!-- Dynamic contents -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-body">
    <div class="d-flex mb-2">
      <input id="searchBox" class="form-control me-2" placeholder="Search students">
      <button id="searchBtn" class="btn btn-outline-secondary">Search</button>
    </div>
    <div class="table-responsive">
      <table class="table table-sm" id="studentsTable">
        <thead><tr><th>ID</th><th>Name</th><th>Department</th><th>Class</th><th>Phone</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let attendanceData = [];

async function loadAttendanceGrid() {
  const dateVal = document.getElementById('attDate').value;
  if (!dateVal) return;
  
  const res = await fetch(`/api/attendance-by-date?date=${dateVal}`);
  attendanceData = await res.json();
  renderAttendanceGrid();
}

function renderAttendanceGrid() {
  const filterVal = document.getElementById('attSearch').value.toLowerCase().trim();
  const tbody = document.querySelector('#attendanceGridTable tbody');
  tbody.innerHTML = '';
  
  const filtered = attendanceData.filter(s => 
    s.name.toLowerCase().includes(filterVal) || 
    s.student_id.toLowerCase().includes(filterVal) ||
    (s.department && s.department.toLowerCase().includes(filterVal)) ||
    (s.class_name && s.class_name.toLowerCase().includes(filterVal))
  );
  
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-3">No students found.</td></tr>';
    return;
  }
  
  filtered.forEach(s => {
    const tr = document.createElement('tr');
    
    let rowClass = '';
    let lateBadge = '';
    if (s.status === 'Present') {
      rowClass = 'table-success-light';
    } else if (s.status === 'Late') {
      if ((s.prev_lates + 1) % 3 === 0) {
        rowClass = 'table-danger-light';
        lateBadge = '<span class="badge bg-danger ms-2" style="font-size: 0.8rem;">❌ Absent (3rd Late)</span>';
      } else {
        rowClass = 'table-warning-light';
        lateBadge = '<span class="badge bg-warning text-dark ms-2" style="font-size: 0.8rem;">⚠️ Late (Count: ' + (s.prev_lates + 1) + '/3)</span>';
      }
    } else if (s.status === 'Absent') {
      rowClass = 'table-danger-light';
    }
    
    if (rowClass) tr.classList.add(rowClass);
    
    const isPresentActive = s.status === 'Present';
    const isLateActive = s.status === 'Late';
    const isAbsentActive = s.status === 'Absent';
    
    tr.innerHTML = `
      <td><strong>${s.student_id}</strong></td>
      <td>${s.name}</td>
      <td><span class="text-muted">${s.department || ''} - ${s.class_name || ''}</span></td>
      <td class="text-center">
        <div class="d-flex align-items-center justify-content-center">
          <div class="btn-group btn-group-sm" role="group">
            <button type="button" class="btn btn-sm btn-outline-success ${isPresentActive ? 'active btn-success text-white' : ''}" onclick="markAttendance('${s.student_id}', 'Present')">Present</button>
            <button type="button" class="btn btn-sm btn-outline-warning ${isLateActive ? 'active btn-warning text-dark' : ''}" onclick="markAttendance('${s.student_id}', 'Late')">Late</button>
            <button type="button" class="btn btn-sm btn-outline-danger ${isAbsentActive ? 'active btn-danger text-white' : ''}" onclick="markAttendance('${s.student_id}', 'Absent')">Absent</button>
          </div>
          ${lateBadge}
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

async function markAttendance(studentId, status) {
  const dateVal = document.getElementById('attDate').value;
  const form = new FormData();
  form.append('student_id', studentId);
  form.append('date', dateVal);
  form.append('status', status);
  
  const res = await fetch('/api/attendance', {
    method: 'POST',
    body: form
  });
  
  const j = await res.json();
  if (j.ok) {
    loadAttendanceGrid();
  } else {
    alert(j.error || 'Error marking attendance');
  }
}

async function bulkMarkAttendance(status) {
  const dateVal = document.getElementById('attDate').value;
  const filterVal = document.getElementById('attSearch').value.toLowerCase().trim();
  
  const filtered = attendanceData.filter(s => 
    s.name.toLowerCase().includes(filterVal) || 
    s.student_id.toLowerCase().includes(filterVal)
  );
  
  for (const s of filtered) {
    const form = new FormData();
    form.append('student_id', s.student_id);
    form.append('date', dateVal);
    form.append('status', status);
    await fetch('/api/attendance', { method: 'POST', body: form });
  }
  loadAttendanceGrid();
}

async function loadStudents(q=''){
  const res = await fetch('/api/students?q='+encodeURIComponent(q));
  const data = await res.json();
  const tbody = document.querySelector('#studentsTable tbody'); tbody.innerHTML='';
  data.forEach(s=>{ const tr=document.createElement('tr'); tr.innerHTML=`<td>${s.student_id}</td><td>${s.name}</td><td>${s.department||''}</td><td>${s.class_name||''}</td><td>${s.phone||''}</td>`; tr.onclick=()=>populateForm(s); tbody.appendChild(tr); });
}

function populateForm(s){ const f=document.getElementById('studentForm'); f.student_id.value=s.student_id; f.name.value=s.name; f.department.value=s.department||''; f.class_name.value=s.class_name||''; f.phone.value=s.phone||''; }

document.getElementById('searchBtn').addEventListener('click', ()=>loadStudents(document.getElementById('searchBox').value));
document.getElementById('studentForm').addEventListener('submit', async (e)=>{ e.preventDefault(); const form=new FormData(e.target); const res=await fetch('/api/student',{method:'POST', body:form}); const j=await res.json(); if(j.ok){ alert('Saved'); e.target.reset(); loadStudents(); loadAttendanceGrid(); } else alert(j.error||'Error'); });

// Setup attendance listeners
document.getElementById('attDate').value = new Date().toISOString().split('T')[0];
document.getElementById('attDate').addEventListener('change', loadAttendanceGrid);
document.getElementById('attSearch').addEventListener('input', renderAttendanceGrid);

document.getElementById('markAllPresentBtn').addEventListener('click', () => bulkMarkAttendance('Present'));
document.getElementById('markAllLateBtn').addEventListener('click', () => bulkMarkAttendance('Late'));
document.getElementById('markAllAbsentBtn').addEventListener('click', () => bulkMarkAttendance('Absent'));

// Initial loads
loadStudents();
loadAttendanceGrid();
</script>

{% endblock %}
