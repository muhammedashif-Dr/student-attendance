{% extends 'layout.html' %}
{% block content %}
<h3>Your Attendance</h3>
<div class="row mb-3">
  <div class="col-md-4">
    <div class="card p-3">
      <h5>Total Days</h5>
      <h2>{{ total_days }}</h2>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card p-3">
      <h5>Present</h5>
      <h2>{{ present }}</h2>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card p-3">
      <h5>Attendance %</h5>
      <h2>{{ percentage }}%</h2>
    </div>
  </div>
</div>
<div class="card">
  <div class="card-body">
    <h5>History</h5>
    <div class="table-responsive">
      <table class="table table-sm">
        <thead><tr><th>Date</th><th>Status</th></tr></thead>
        <tbody>
          {% for date, status in rows %}
            <tr><td>{{ date }}</td><td>{{ status }}</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
